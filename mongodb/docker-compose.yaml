networks:
  mongo-net:
    driver: bridge

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb-local
    networks:
      mongo-net:
        aliases:
          - mongo
          - mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongoadmin
      - MONGO_INITDB_ROOT_PASSWORD=m0ng0!2026
    volumes:
      - mongo-data:/data/db
      - ./mongodb-keyfile:/data/configdb/mongodb-keyfile
    command: >
      mongod --replSet rs0 
      --keyFile /data/configdb/mongodb-keyfile 
      --bind_ip_all
    # We set user 'mongodb' as the keyfile owner
    user: "999:999"

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express-local
    networks:
      - mongo-net
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongoadmin:m0ng0!2026@mongo:27017/?authSource=admin&replicaSet=rs0
      - ME_CONFIG_BASICAUTH_USERNAME=webuser
      - ME_CONFIG_BASICAUTH_PASSWORD=webpassword
    depends_on:
      - mongodb

volumes:
  mongo-data:
